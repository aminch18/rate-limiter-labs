---
# Loadgen Job — runs the Go load generator once and exits.
# For k6-based load testing use the GitHub Actions workflow instead.
#
# Re-run: kubectl delete job loadgen -n rate-limiter && kubectl apply -f k8s/loadgen-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
  namespace: rate-limiter
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: rate-limiter-loadgen:local
          imagePullPolicy: IfNotPresent
          args: ["-addr", "gateway:8080"]
          resources:
            requests:
              cpu: "50m"
              memory: "16Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
