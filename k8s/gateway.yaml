---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: rate-limiter
  labels:
    app: gateway
    app.kubernetes.io/part-of: rate-limiter-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        # Prometheus auto-scrape via pod annotations.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          # kind:  rate-limiter-gateway:local  (loaded with `kind load`)
          # cloud: ghcr.io/<owner>/rate-limiter-gateway:<tag>
          image: rate-limiter-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: rate-limiter
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  # NodePort so kind can expose the gateway on the host without an Ingress.
  # Fixed port 30080 matches the extraPortMappings in k8s/kind-config.yaml.
  # In a cloud cluster with a LoadBalancer controller, change to LoadBalancer.
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
