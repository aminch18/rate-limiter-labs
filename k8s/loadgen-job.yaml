---
# Loadgen Job — runs once, prints the comparison table, then exits.
# To run a new load test after the first: kubectl delete job loadgen && kubectl apply -f k8s/loadgen-job.yaml
#
# For distributed load (multiple concurrent loadgens hitting the same gateway):
#   kubectl scale job loadgen --replicas=5   # not natively supported on Job
#   → Use a Deployment instead and set replicas, or submit N independent Jobs.
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
spec:
  # Don't retry on failure — a failed loadgen is a bug, not a transient error.
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: rate-limiter-loadgen:latest   # replace with your registry/image:tag
          imagePullPolicy: IfNotPresent
          args: ["-addr", "gateway:8080"]
          resources:
            requests:
              cpu: "50m"
              memory: "16Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
