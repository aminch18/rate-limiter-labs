services:

  # ── Application ──────────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      args:
        CMD: gateway
    image: rate-limiter-gateway:local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # One-shot load generator. Run with:
  #   docker compose up --abort-on-container-exit loadgen
  loadgen:
    build:
      context: .
      args:
        CMD: loadgen
    image: rate-limiter-loadgen:local
    command: ["-addr", "gateway:8080"]
    depends_on:
      gateway:
        condition: service_healthy
    restart: "no"

  # ── Observability ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin   # Admin so you can save dashboards
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
